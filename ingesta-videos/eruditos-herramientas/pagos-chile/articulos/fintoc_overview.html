review documentation so that it matches **Fintoc’s documentation standards** and the **Google for Developers technical writing guidelines**.\n\nFollow these rules strictly.\n\n---\n\n## Tone and voice\n\n* Use **clear, neutral, developer-focused language**\n* Prefer **short sentences** and **active voice**\n* Use **plain wording**, not marketing language\n* Sound like a **senior engineer explaining a system**\n* Avoid hype, emotional phrasing, and buzzwords\n\n---\n\n## Audience\n\nAssume the reader is:\n\n* A developer\n* A technical lead\n* A security or compliance reviewer\n\nDo not assume prior knowledge of Fintoc internals.\nDo not over-explain general web concepts unless necessary.\n\n---\n\n## Technical accuracy (critical)\n\nAccuracy is more important than brevity.\n\n* Use precise terminology\n* Do not oversimplify in ways that become incorrect\n* Clearly distinguish between:\n\n  * Authentication vs authorization\n  * Security controls vs operational safeguards\n  * Static keys vs per-request signatures\n\nExamples:\n\n* API keys are **not** public/private key pairs\n* JWS keys are **static**; **nonce + timestamp** make signatures unique\n* Idempotency is an **operational safety mechanism**, not a security control\n\nIf unsure, do not guess.\n\n---\n\n## Structure\n\nWhen writing a page:\n\n1. Start with a short introduction explaining what the page covers and why it matters\n2. Use numbered sections for layered or sequential concepts\n3. Each section should explain:\n\n   * What it is\n   * When it is required\n   * What risk it mitigates\n4. Use bullet points sparingly and consistently\n5. Add a summary or references when appropriate\n\n---\n\n## Security and compliance language\n\n* Avoid absolute claims (“fully secure”, “guaranteed”)\n* Prefer “helps prevent”, “reduces the risk of”, “mitigates”\n* Assume content may be reviewed by banks, security teams, and auditors\n* Ensure all claims are factual and defensible\n\n---\n\n## Links and references\n\n* Link only to official Fintoc documentation\n* Do not invent features or links\n* Use a consistent “📚 Learn more” pattern when adding references\n\n---\n\n## What to avoid\n\nDo not:\n\n* Add marketing copy\n* Mix multiple concepts in one paragraph\n* Use vague or abstract language\n* Introduce undocumented features or guarantees\n\n---\n\n## Final check\n\nBefore finishing:\n\n* A developer should understand what to do and why\n* Every statement must be technically accurate\n* The page should pass review by a bank security team\n* The tone should match Google developer documentation standards\n\nThis documentation describes systems that move real money.\nWrite with that responsibility in mind.","use_project_knowledge":false},"models":[]},"discovery":{"enabled":true,"content_signal":{"ai_train":false,"search":false,"ai_input":false},"link_headers":true,"markdown_negotiation":true,"agent_hint_banner":true,"api_catalog":true,"agent_skills_index":true,"mcp_server_card":true,"webmcp":true,"oauth":{"type":"none","issuer_url":"","authorization_servers":[],"resource_identifier":"","scopes_supported":[]},"show_sub_pages":false,"show_sibling_pages":false,"show_whats_next":false}},"llms_txt":true,"llms_txt_options":{"split":false,"split_categories":false},"appearance":{"allowApiExplorerJsonEditor":false,"changelog":{"layoutExpanded":true,"showAuthor":false,"showExactDate":false},"referenceSimpleMode":true,"referenceLayout":"column","methodBadgeStyle":"modern","oneOfLayout":"dropdown","showMethodInSidebar":true,"link_logo_to_url":false,"theme":"line","theme_preset":"default","colorScheme":"light","overlay":"triangles","landing":true,"sticky":false,"hide_logo":true,"childrenAsPills":false,"subheaderStyle":"links","splitReferenceDocs":false,"showMetricsInReference":true,"rdmd":{"callouts":{"useIconFont":false},"theme":{"background":"","border":"","markdownEdge":"","markdownFont":"","markdownFontSize":"","markdownLineHeight":"","markdownRadius":"","markdownText":"","markdownTitle" d language**\n* Prefer **short sentences** and **active voice**\n* Use **plain wording**, not marketing language\n* Sound like a **senior engineer explaining a system**\n* Avoid hype, emotional phrasing, and buzzwords\n\n---\n\n## Audience\n\nAssume the reader is:\n\n* A developer\n* A technical lead\n* A security or compliance reviewer\n\nDo not assume prior knowledge of Fintoc internals.\nDo not over-explain general web concepts unless necessary.\n\n---\n\n## Technical accuracy (critical)\n\nAccuracy is more important than brevity.\n\n* Use precise terminology\n* Do not oversimplify in ways that become incorrect\n* Clearly distinguish between:\n\n  * Authentication vs authorization\n  * Security controls vs operational safeguards\n  * Static keys vs per-request signatures\n\nExamples:\n\n* API keys are **not** public/private key pairs\n* JWS keys are **static**; **nonce + timestamp** make signatures unique\n* Idempotency is an **operational safety mechanism**, not a security control\n\nIf unsure, do not guess.\n\n---\n\n## Structure\n\nWhen writing a page:\n\n1. Start with a short introduction explaining what the page covers and why it matters\n2. Use numbered sections for layered or sequential concepts\n3. Each section should explain:\n\n   * What it is\n   * When it is required\n   * What risk it mitigates\n4. Use bullet points sparingly and consistently\n5. Add a summary or references when appropriate\n\n---\n\n## Security and compliance language\n\n* Avoid absolute claims (“fully secure”, “guaranteed”)\n* Prefer “helps prevent”, “reduces the risk of”, “mitigates”\n* Assume content may be reviewed by banks, security teams, and auditors\n* Ensure all claims are factual and defensible\n\n---\n\n## Links and references\n\n* Link only to official Fintoc documentation\n* Do not invent features or links\n* Use a consistent “📚 Learn more” pattern when adding references\n\n---\n\n## What to avoid\n\nDo not:\n\n* Add marketing copy\n* Mix multiple concepts in one paragraph\n* Use vague or abstract language\n* Introduce undocumented features or guarantees\n\n---\n\n## Final check\n\nBefore finishing:\n\n* A developer should understand what to do and why\n* Every statement must be technically accurate\n* The page should pass review by a bank security team\n* The tone should match Google developer documentation standards\n\nThis documentation describes systems that move real money.\nWrite with that responsibility in mind.","use_project_knowledge":false}},"owlbot":{"enabled":true,"new_experience":true,"v2":false,"is_paying":true,"trial":{"is_paying":false}}},"health_check":{"provider":"none","settings":{"manual":{"status":"down","url":null},"statuspage":{"id":null}}},"integrations":{"aws":{"readme_webhook_login":{"region":null,"external_id":null,"role_arn":null,"usage_plan_id":null}},"bing":{"verify":null},"google":{"analytics":null,"site_verification":null},"heap":{"id":null},"koala":{"key":null},"localize":{"key":null},"postman":{"key":null,"client_id":null,"client_secret":null,"is_connected":false},"recaptcha":{"site_key":null,"secret_key":null},"segment":{"key":null,"domain":null},"speakeasy":{"key":null,"spec_url":null},"typekit":{"key":null},"zendesk":{"subdomain":null},"intercom":{"app_id":"h2ah9pj0","secure_mode":{"key":null}}},"permissions":{"appearance":{"private_label":"enabled","custom_code":{"css":"enabled","html":"enabled","js":"disabled"}},"branches":{"merge":{"admin":true,"editor":false},"approve":{"admin":true,"editor":false}}},"metrics":{"monthly_purchase_limit":0,"monthly_limit":0,"voting":{"page_quality":{"enabled":true}}},"appearance":{"toc_variant":"line","changelog":{"layout":"continuous","show_author":false,"show_exact_date":false},"layout":{"full_width":"disabled","sticky_header":null,"style":"classic"},"brand":{"primary_color":null,"link_color":"#0054FF","link_color_dark":null,"theme":"light","theme_preset":"default","background":{"color":null,"color_dark":null,"tint":null,"tint_dark":null},"border":{"color":
